name: Build and push image

on:
  push:
    branches: ["dev"]
  pull_request:
    branches: ["dev"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Checkout Infra Repository
        uses: actions/checkout@v4
        with:
          repository: repository/name
          token: ${{ secrets.GH_PAT }}
          path: eco-infra

      - name: Update Image Tag in Deployment
        run: |
          cd eco-infra
          # Update tag to commit hash
          sed -i "s|image: .*|image: ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{ github.sha }}|g" eco-backend/deployment.yaml
          
          # Setup git for commit
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          
          # Check for updates and than
          if [[ -n $(git status -s) ]]; then
            git commit -am "Update image tag to ${{ github.sha }}"
            git push
          else
            echo "No changes to commit"
          fi